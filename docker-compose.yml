version: '3.8'

services:
  funpay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: funpay-cardinal
    restart: unless-stopped
    volumes:
      # Persist configuration files
      - ./configs:/app/configs
      # Persist logs
      - ./logs:/app/logs
      # Persist storage data
      - ./storage:/app/storage
      # Persist plugins
      - ./plugins:/app/plugins
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
